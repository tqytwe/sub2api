# Sub2API â€” self-hosted deploy (external PG/Redis, no bundled DB containers)
# Primary production deploy: push play/main â†’ Zeabur (see deploy/zeabur.template.yaml).
# Usage (optional bare-metal / VPS):
#   cd deploy
#   cp .env.server.example .env   # first time only, then edit secrets
#   docker compose -f docker-compose.server.yml up -d --build

services:
  sub2api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    image: sub2api:local
    container_name: sub2api
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8206}:8080"
    volumes:
      - sub2api_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}
      - MODEL_SYNC_SOURCE=${MODEL_SYNC_SOURCE:-aihubmix}
      - AIHUBMIX_MODELS_URL=${AIHUBMIX_MODELS_URL:-https://aihubmix.com/api/v1/models}
      - AIHUBMIX_API_KEY=${AIHUBMIX_API_KEY:-}
      - DATABASE_HOST=${DATABASE_HOST:?DATABASE_HOST is required}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-sub2api}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      - DATABASE_DBNAME=${DATABASE_DBNAME:-sub2api}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-disable}
      - REDIS_HOST=${REDIS_HOST:?REDIS_HOST is required}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-1}
      - IMAGE_STORAGE_ENABLED=${IMAGE_STORAGE_ENABLED:-false}
      - IMAGE_STORAGE_BACKEND=${IMAGE_STORAGE_BACKEND:-local}
      - IMAGE_STORAGE_LOCAL_DIR=${IMAGE_STORAGE_LOCAL_DIR:-}
      - IMAGE_STORAGE_LOCAL_URL_PREFIX=${IMAGE_STORAGE_LOCAL_URL_PREFIX:-/v1/images/task-assets/}
      - IMAGE_STORAGE_ENDPOINT=${IMAGE_STORAGE_ENDPOINT:-}
      - IMAGE_STORAGE_REGION=${IMAGE_STORAGE_REGION:-auto}
      - IMAGE_STORAGE_BUCKET=${IMAGE_STORAGE_BUCKET:-}
      - IMAGE_STORAGE_ACCESS_KEY_ID=${IMAGE_STORAGE_ACCESS_KEY_ID:-}
      - IMAGE_STORAGE_SECRET_ACCESS_KEY=${IMAGE_STORAGE_SECRET_ACCESS_KEY:-}
      - IMAGE_STORAGE_PREFIX=${IMAGE_STORAGE_PREFIX:-images/}
      - IMAGE_STORAGE_FORCE_PATH_STYLE=${IMAGE_STORAGE_FORCE_PATH_STYLE:-false}
      - IMAGE_STORAGE_PUBLIC_BASE_URL=${IMAGE_STORAGE_PUBLIC_BASE_URL:-}
      - IMAGE_STORAGE_PRESIGN_EXPIRY_HOURS=${IMAGE_STORAGE_PRESIGN_EXPIRY_HOURS:-24}
      - IMAGE_STORAGE_MAX_DOWNLOAD_BYTES=${IMAGE_STORAGE_MAX_DOWNLOAD_BYTES:-33554432}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
      - SETUP_MIGRATION_TIMEOUT_SECONDS=${SETUP_MIGRATION_TIMEOUT_SECONDS:-120}
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  sub2api_data:
    driver: local
