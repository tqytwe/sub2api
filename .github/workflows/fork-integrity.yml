name: Fork Integrity

on:
  pull_request:
    branches:
      - play/main
      - 'sync/upstream-*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fork-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protected-behavior:
    name: Protected behavior
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 10.34.4

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Check protected Fork behavior
        run: ./scripts/check-fork-integrity.sh

      - name: Run backend unit tests
        working-directory: backend
        run: go test -tags=unit ./...

      - name: Lint frontend
        run: pnpm --dir frontend run lint:check

      - name: Type-check frontend
        run: pnpm --dir frontend run typecheck

      - name: Run frontend tests
        run: pnpm --dir frontend run test:run

      - name: Build frontend
        run: pnpm --dir frontend run build

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Check document index and local targets
        run: node scripts/check-doc-links.mjs

      - name: Check Markdown links with lychee 2.9.0
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8
        with:
          args: >-
            --offline
            --no-progress
            ./DEV_GUIDE.md
            ./README.md
            ./README_CN.md
            ./README_JA.md
            './docs/**/*.md'
            './deploy/*.md'
          fail: true
